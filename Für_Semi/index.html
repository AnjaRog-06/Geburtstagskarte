<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semi's Geburtstagskarte :]</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="light.css" id="theme-light">
    <link rel="stylesheet" href="dark.css" id="theme-dark" disabled>
</head>
<body>
    <!-- Theme und Animation Controls -->
    <div class="controls">
        <button class="btn btn-light" id="btn-light" title="Lightmode">
            <span class="sun-icon">☀️</span>
        </button>
        <button class="btn btn-dark" id="btn-dark" title="Darkmode">
            <span class="moon-icon">🌙</span>
        </button>
        <button class="btn btn-play-pause" id="btn-play-pause" title="Animation pausieren/fortsetzen">
            <span class="play-pause-icon">⏸️</span>
        </button>
    </div>

    <!-- Hauptcontainer -->
    <div class="scene">
        <!-- Himmel mit Farbverlauf (ändert sich je nach Theme) -->
        <div class="sky"></div>

        <!-- Wolken (nur im Lightmode sichtbar) -->
        <div class="clouds-container">
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
        </div>

        <!-- Sternschnuppen (nur im Darkmode sichtbar) -->
        <div class="meteors-container">
            <div class="meteor meteor-1"></div>
            <div class="meteor meteor-2"></div>
            <div class="meteor meteor-3"></div>
        </div>

        <!-- Sonne -->
        <div class="sun"></div>

        <!-- Glühende Partikel um die Karte -->
        <div class="card-particles">
            <div class="particle particle-1"></div>
            <div class="particle particle-2"></div>
            <div class="particle particle-3"></div>
            <div class="particle particle-4"></div>
            <div class="particle particle-5"></div>
            <div class="particle particle-6"></div>
            <div class="particle particle-7"></div>
            <div class="particle particle-8"></div>
            <div class="particle particle-9"></div>
            <div class="particle particle-10"></div>
            <div class="particle particle-11"></div>
            <div class="particle particle-12"></div>
            <div class="particle particle-13"></div>
            <div class="particle particle-14"></div>
            <div class="particle particle-15"></div>
            <div class="particle particle-16"></div>
            <div class="particle particle-17"></div>
            <div class="particle particle-18"></div>
            <div class="particle particle-19"></div>
            <div class="particle particle-20"></div>
            <div class="particle particle-21"></div>
            <div class="particle particle-22"></div>
            <div class="particle particle-23"></div>
            <div class="particle particle-24"></div>
            <div class="particle particle-25"></div>
        </div>

        <!-- Geburtstagskarte -->
        <div class="birthday-card">
            <div class="card-content">
                <h1 class="card-title">Happy Birthday Semi!</h1>
                <p class="card-text" id="greeting-text">
                    Ich wünsche dir unzählige Zombies in Diamantrüstung…
                </p>
                <div class="card-decoration">✦ ✦ ✦</div>
            </div>
        </div>

        <!-- Wiese -->
        <div class="ground">
            <!-- Blumen -->
            <div class="flowers-container">
                <div class="flower flower-pink flower-1"></div>
                <div class="flower flower-pink flower-2"></div>
                <div class="flower flower-purple flower-3"></div>
                <div class="flower flower-white flower-4"></div>
                <div class="flower flower-purple flower-5"></div>
                <div class="flower flower-pink flower-6"></div>
                <div class="flower flower-white flower-7"></div>
            </div>

            <!-- Characters Container (ändert sich je nach Theme) -->
            <div class="characters-container">
                <!-- Lightmode Characters -->
                <div class="lightmode-characters">
                    <!-- Creeper 1 -->
                    <div class="figure creeper-fig creeper-fig-1">
                        <div class="body creeper-body"></div>
                        <div class="head creeper-head"></div>
                        <div class="eyes"></div>
                    </div>
                    
                    <!-- Zombie 1 -->
                    <div class="figure zombie-fig zombie-fig-1">
                        <div class="body zombie-body"></div>
                        <div class="head zombie-head"></div>
                        <div class="eyes"></div>
                    </div>
                    
                    <!-- Bee 1 -->
                    <div class="figure bee-fig bee-fig-1">
                        <div class="body bee-body"></div>
                        <div class="wings"></div>
                    </div>
                    
                    <!-- Zombie mit Diamantrüstung -->
                    <div class="figure zombie-fig zombie-diamond-fig zombie-fig-2">
                        <div class="body zombie-diamond-body"></div>
                        <div class="head zombie-head"></div>
                        <div class="eyes"></div>
                        <div class="armor"></div>
                    </div>
                    
                    <!-- Creeper 2 -->
                    <div class="figure creeper-fig creeper-fig-2">
                        <div class="body creeper-body"></div>
                        <div class="head creeper-head"></div>
                        <div class="eyes"></div>
                    </div>
                    
                    <!-- Zombie 2 -->
                    <div class="figure zombie-fig zombie-fig-3">
                        <div class="body zombie-body"></div>
                        <div class="head zombie-head"></div>
                        <div class="eyes"></div>
                    </div>
                    
                    <!-- Bee 2 -->
                    <div class="figure bee-fig bee-fig-2">
                        <div class="body bee-body"></div>
                        <div class="wings"></div>
                    </div>
                </div>

                <!-- Darkmode Characters -->
                <div class="darkmode-characters">
                    <!-- Schaf 1 -->
                    <div class="figure sheep-fig sheep-fig-1">
                        <div class="body sheep-body"></div>
                        <div class="head sheep-head"></div>
                        <div class="eyes"></div>
                    </div>
                    
                    <!-- Schaf 2 -->
                    <div class="figure sheep-fig sheep-fig-2">
                        <div class="body sheep-body"></div>
                        <div class="head sheep-head"></div>
                        <div class="eyes"></div>
                    </div>
                    
                    <!-- Schaf 3 -->
                    <div class="figure sheep-fig sheep-fig-3">
                        <div class="body sheep-body"></div>
                        <div class="head sheep-head"></div>
                        <div class="eyes"></div>
                    </div>
                    
                    <!-- Schaf 4 -->
                    <div class="figure sheep-fig sheep-fig-4">
                        <div class="body sheep-body"></div>
                        <div class="head sheep-head"></div>
                        <div class="eyes"></div>
                    </div>
                    
                    <!-- Schaf 5 -->
                    <div class="figure sheep-fig sheep-fig-5">
                        <div class="body sheep-body"></div>
                        <div class="head sheep-head"></div>
                        <div class="eyes"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
